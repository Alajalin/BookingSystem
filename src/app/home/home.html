<h2 style="text-align:center;">Available Slots</h2>

<div style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">

  <div *ngFor="let slot of slots"
       style="border:1px solid #ddd; border-radius:10px; padding:15px; width:250px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">

    <h3 style="margin:0; color:#2c3e50;">{{ slot.doctorName }}</h3>

    <p><strong>Date:</strong> {{ slot.slotDate | date:'yyyy-MM-dd' }}</p>
    <p><strong>Time:</strong> {{ slot.startTime }} - {{ slot.endTime }}</p>

    <button 
      (click)="book(slot.id)"
      style="width:100%; padding:8px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">
      Book
    </button>

  </div>

</div>
